<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top AppBar (Back Action - Transactional Context) -->
<header class="flex items-center w-full px-md h-14 bg-surface border-b border-outline-variant">
<button class="p-2 hover:bg-surface-container-low transition-colors rounded-full text-on-surface-variant Active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</header>
<main class="flex-grow flex items-center justify-center p-md">
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl shadow-[0_2px_12px_rgba(0,69,13,0.08)] p-xl flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-lg flex flex-col items-center">
<div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center mb-sm shadow-inner overflow-hidden border border-outline-variant">
<img alt="EcoRuta Logo" class="w-14 h-14 object-contain" data-alt="A professional and minimalist corporate logo for a coffee technology brand named EcoRuta. The logo features stylized coffee beans and a digital leaf motif in deep forest green. The overall aesthetic is clean, modern, and high-tech, reflecting the digital harvest concept within a bright, minimalist agricultural context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZ71ySNtz9UGgC9OQJcNt8S3CCKbXt1JzoSTO_SwhKuDEJD0Lvz5dDX4kyRx_BXb_K4OIRZdqMIhynZ8K2TlmCInwkRQTJFYENPWZEL7VKn-8Ayey6_fDlTxFDmMLqOHqgi74K-a96qwDqo4ll4PP2wRf1_TKg09HNCwgaFHKUXn8q14E0QJQekgsi5VPWnGYzvERNFeTxAfFyB00nO5w4uClowqOHyfthooB60f-RMzBNVNLLBiQYQ5CP0zvBPZgGTo_pqVySOGk"/>
</div>
<h1 class="font-headline-md text-headline-md text-primary font-bold">Iniciar Sesión</h1>
</div>
<!-- Login Form -->
<form class="w-full space-y-lg">
<!-- Username Field -->
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="username">Usuario o correo</label>
<div class="relative">
<input class="w-full h-12 px-md bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-body-md placeholder:text-on-surface-variant/50 transition-all" id="username" placeholder="ejemplo@correo.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Contraseña</label>
<div class="relative flex items-center">
<input class="w-full h-12 px-md bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-body-md placeholder:text-on-surface-variant/50 transition-all" id="password" placeholder="••••••••••••" type="password"/>
<button class="absolute right-md text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Offline Checkbox -->
<div class="flex items-center gap-sm">
<input class="w-5 h-5 rounded border-outline text-secondary focus:ring-secondary cursor-pointer" id="offline" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="offline">Mantener sesión offline</label>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-secondary text-on-secondary font-label-lg text-label-lg rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all" type="submit">
                    Ingresar
                </button>
<!-- Forgot Password Link -->
<div class="text-center">
<a class="font-label-lg text-label-lg text-primary hover:underline transition-all" href="#">¿Olvidó la contraseña?</a>
</div>
</form>
</div>
</main>
<!-- Footer Indicator (Offline Status) -->
<footer class="p-lg flex justify-center items-center">
<div class="flex items-center gap-sm px-lg py-sm bg-error-container text-on-error-container rounded-full shadow-sm border border-error/10">
<span class="material-symbols-outlined text-[18px]" data-icon="cloud_off" style="font-variation-settings: 'FILL' 1;">cloud_off</span>
<span class="font-label-sm text-label-sm font-semibold">Sin internet - Modo offline disponible</span>
</div>
</footer>
</body></html>
