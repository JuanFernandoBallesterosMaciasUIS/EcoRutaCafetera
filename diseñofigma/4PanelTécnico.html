<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface docked full-width top-0 border-b border-outline-variant flex justify-between items-center w-full px-md h-14 z-50">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-primary p-2 hover:bg-surface-container-low transition-colors rounded-full active:opacity-80 active:scale-95">menu</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">EcoRuta</h1>
</div>
<button class="flex items-center gap-xs px-3 py-1.5 rounded-full border border-primary text-primary hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">sync</span>
<span class="font-label-lg text-label-lg">Sync</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-md mx-auto px-md py-lg space-y-lg pb-32">
<!-- Profile Section -->
<section class="bg-surface-container-lowest rounded-xl p-md flex items-center gap-md shadow-[0_2px_4px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<div class="relative">
<img class="w-16 h-16 rounded-full object-cover border-2 border-primary-fixed" data-alt="A professional headshot of a Hispanic male field technician in his late 30s with a warm, confident expression. He is wearing a practical outdoor work shirt. The background is a soft-focus lush green coffee plantation under bright morning sunlight, maintaining a high-key Corporate Modern aesthetic with organic tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCe6BOHffi9OyAqV1SF99kcsRUpLJ8qTkozJwyw8PeR3-oNdk62Iv7jEyu_oYR2sZwYznZYnhOXLycmokEbcHE7TFyDMS4KdlN3kNT_JWcO9666CHq2f2UfbX76C0yx4w0UyUEOAtWZCUVZD0UqHTHertWq2GdqgraqpyfFylQORENZqFMykzP8snQuO7PwdOkoVqJ0bx9RB8yYqPX-Jvp2f61UdJqpbc1uarbvYfXlfqaqAgh6zYhlxzbxGo2E481Q6zwqVoPcTT0"/>
<div class="absolute bottom-0 right-0 w-4 h-4 bg-secondary border-2 border-surface rounded-full"></div>
</div>
<div class="flex flex-col">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-unit">Hola,</p>
<h2 class="font-headline-sm text-headline-sm text-primary">Iván Martínez</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Técnico de campo</p>
<div class="flex items-center gap-xs mt-unit">
<span class="material-symbols-outlined text-[14px] text-primary">location_on</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Municipio: Barbosa</span>
</div>
</div>
</section>
<!-- Primary Actions (Quick Launch) -->
<section class="grid grid-cols-1 gap-md">
<!-- Action 1: Registrar Finca -->
<button class="group flex items-center justify-between bg-surface-container-lowest border-2 border-outline-variant p-lg rounded-xl hover:bg-surface-container transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="bg-primary-container p-3 rounded-lg text-on-primary-container group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]">add_home</span>
</div>
<div class="text-left">
<p class="font-headline-sm text-headline-sm text-primary">Registrar Finca</p>
<p class="font-body-md text-body-md text-on-surface-variant">Dar de alta un nuevo predio</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Action 2: Iniciar Ruta GPS (Dark Primary) -->
<button class="group flex items-center justify-between bg-primary p-lg rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-[0.98]">
<div class="flex items-center gap-md text-on-primary">
<div class="bg-white/10 p-3 rounded-lg group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">route</span>
</div>
<div class="text-left">
<p class="font-headline-sm text-headline-sm">Iniciar Ruta GPS</p>
<p class="font-body-md text-body-md text-primary-fixed">Trazar recorrido de campo</p>
</div>
</div>
<span class="material-symbols-outlined text-primary-fixed">chevron_right</span>
</button>
<!-- Action 3: Capturar Indicadores -->
<button class="group flex items-center justify-between bg-surface-container-lowest border-2 border-outline-variant p-lg rounded-xl hover:bg-surface-container transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="bg-tertiary-container p-3 rounded-lg text-on-tertiary-container group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<div class="text-left">
<p class="font-headline-sm text-headline-sm text-primary">Capturar Indicadores</p>
<p class="font-body-md text-body-md text-on-surface-variant">Formularios de sostenibilidad</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
</section>
<!-- Pending Sync Card -->
<section class="bg-tertiary-fixed text-on-tertiary-fixed rounded-xl p-md border border-tertiary-fixed-dim/50 shadow-sm">
<div class="flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="bg-tertiary-container/20 p-2 rounded-full">
<span class="material-symbols-outlined text-tertiary">cloud_sync</span>
</div>
<div>
<h3 class="font-label-lg text-label-lg font-bold">Pendientes Sync</h3>
<p class="font-body-md text-body-md opacity-90">12 registros por sincronizar</p>
</div>
</div>
<button class="p-2 rounded-full hover:bg-black/5 transition-colors">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</section>
</main>

<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container shadow-[0_-2px_10px_rgba(0,0,0,0.05)] flex justify-around items-center py-sm h-18">
<!-- Inicio (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-sm text-label-sm">Inicio</span>
</a>
<!-- Fincas -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-highest transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">agriculture</span>
<span class="font-label-sm text-label-sm">Fincas</span>
</a>
<!-- Mapa -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-highest transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">map</span>
<span class="font-label-sm text-label-sm">Mapa</span>
</a>
<!-- Más -->

<span class="font-label-sm text-label-sm">Más</span>
